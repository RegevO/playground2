name: "Infrastructure Lifecycle"

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Choose action: apply or destroy'
        required: true
        default: 'apply'
        type: choice
        options:
          - apply
          - destroy

jobs:
  terragrunt:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: 'us-east-1'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.7
          terraform_wrapper: false

      - name: Setup Terragrunt
        uses: autero1/action-terragrunt@v3
        with:
          terragrunt-version: 0.98.0
      
      - name: Terragrunt Action
        id: tg_action
        env:
          TG_NON_INTERACTIVE: "true"
        run: |
          cd infra/live
          if [ "${{ github.event.inputs.action }}" == "apply" ]; then
            # In v0.9x, 'stack apply' is the modern 'run-all apply'
            terragrunt stack apply -- -auto-approve
            
            # Use 'run --' to extract the output from the cloudfront module
            CF_DOMAIN=$(cd cloudfront && terragrunt run -- output -raw domain_name)
            echo "CF_DOMAIN=$CF_DOMAIN" >> $GITHUB_ENV
          else
            # 'stack destroy' handles the entire dependency tree
            terragrunt stack destroy -- -auto-approve
          fi

      - name: Setup Python
        if: github.event.inputs.action == 'apply'
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        if: github.event.inputs.action == 'apply'
        run: pip install requests boto3

      - name: Run Processor & Dynamic Verify
        if: github.event.inputs.action == 'apply'
        run: |
          python app/processor.py ${{ env.CF_DOMAIN }}